<svg width="760" height="64" viewBox="0 0 760 64" xmlns="http://www.w3.org/2000/svg">
  <style>
    @keyframes lumi-f-twinkle { 0%, 100% { opacity: .15; } 50% { opacity: .8; } }
    @keyframes lumi-f-ring    { 0%, 100% { opacity: .25; r: 4px; } 50% { opacity: .05; r: 15px; } }
    .lumi-f-star { animation: lumi-f-twinkle 3s ease-in-out infinite; }
    .lumi-f-ring { animation: lumi-f-ring 2.6s ease-out infinite; }
    @media (prefers-reduced-motion: reduce) {
      .lumi-f-star, .lumi-f-ring { animation: none !important; }
    }
  </style>
  <rect width="760" height="64" rx="12" fill="#05070a"/>
  <rect x="0.5" y="0.5" width="759" height="63" rx="11.5" fill="none" stroke="#2a2d31"/>
  <g fill="#ffffff">
    <circle class="lumi-f-star" cx="60" cy="20" r="1.1" style="animation-delay:0s"/>
    <circle class="lumi-f-star" cx="120" cy="44" r="1" style="animation-delay:.5s"/>
    <circle class="lumi-f-star" cx="640" cy="18" r="1.1" style="animation-delay:1s"/>
    <circle class="lumi-f-star" cx="700" cy="42" r="1" style="animation-delay:1.5s"/>
  </g>
  <circle class="lumi-f-ring" cx="380" cy="32" r="15" fill="none" stroke="#5dcaa5" stroke-width="0.8" style="animation-delay:.9s"/>
  <circle class="lumi-f-ring" cx="380" cy="32" r="9" fill="none" stroke="#5dcaa5" stroke-width="1" style="animation-delay:.45s"/>
  <circle cx="380" cy="32" r="4" fill="none" stroke="#5dcaa5" stroke-width="1.4"/>
  <text x="380" y="52" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" fill="#6a6f75">Lumi — geolocalización street-view, self-hosted</text>
</svg>
