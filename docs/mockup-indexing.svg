  <line x1="614" y1="68" x2="886" y2="68" stroke="#2c2d30" stroke-width="1"/>

  <text x="614" y="92" font-size="10" fill="#9a9a95">Puntos de captura</text>
  <text x="820" y="92" font-size="10" fill="#ffffff" font-weight="600">1,842 / 2,300</text>
  <rect x="614" y="100" width="272" height="6" rx="3" fill="#2c2d30"/>
